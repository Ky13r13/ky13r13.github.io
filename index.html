<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name | Engineering Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans">

  <!-- Hero -->
  <section class="min-h-screen flex flex-col justify-center items-center text-center px-6">
    <h1 class="text-5xl font-bold mb-4">Your Name</h1>
    <p class="text-xl text-gray-400 mb-8">Engineering Student · [Your Focus Area]</p>
    <a href="#projects" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg text-lg">
      View My Work
    </a>
  </section>

  <!-- Projects -->
  <section id="projects" class="max-w-5xl mx-auto px-6 py-20">
    <h2 class="text-3xl font-bold mb-10 text-center">Projects</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Repeat this card for each project -->
      <div class="bg-gray-800 rounded-xl p-6">
        <h3 class="text-xl font-semibold mb-2">Project Name</h3>
        <p class="text-gray-400 mb-4">Short description of what you built and what problem it solved.</p>
        <a href="#" class="text-blue-400 hover:underline">View Project →</a>
      </div>
    </div>
  </section>

</body>
</html>
